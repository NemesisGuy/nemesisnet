    :root{

      --bg-gradient: linear-gradient(135deg, var(--nemesis-white) 0%, #f0f6ff 50%, #eaf6ff 100%);

      --glass-bg: rgba(255,255,255,0.9);
      --glass-border: rgba(41,121,255,0.08);

    body { height:100%; background: var(--bg-gradient); background-attachment: fixed; color:var(--text-color); line-height:1.7; padding-top: var(--nav-height, 60px); }

      width:350px; height:350px; border-radius:50%; display:flex; align-items:center; justify-content:center;

      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06), 0 0 60px var(--accent-glow);
      transition: transform 0.36s cubic-bezier(0.4,0,0.2,1), box-shadow 0.36s ease;
    }
    .avatar-img{ max-width:86%; max-height:86%; object-fit:contain; display:block; }
    header { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color:white; text-align:center; padding:60px 20px 50px; min-height:100vh; min-height:100svh; display:flex; flex-direction:column; justify-content:center; align-items:center; border-bottom: 1px solid var(--glass-border); }
