steps:
  build:
    image: node:22
    commands:
      - npm ci
      - npm run build
    when:
      event: [push, tag, manual]

  docker-build:
    image: docker:27
    pull: true
    commands:
      - echo "Docker Hub login..."
      - echo $${DOCKER_PASSWORD} | docker login -u $${DOCKER_USERNAME} --password-stdin
      - docker build --no-cache -t nemesisguy/nemesisnet:dev -t nemesisguy/nemesisnet:$${CI_COMMIT_SHA} .
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      event: [push, tag, manual]

  docker-push:
    image: docker:27
    pull: true
    commands:
      - echo $${DOCKER_PASSWORD} | docker login -u $${DOCKER_USERNAME} --password-stdin
      - docker push nemesisguy/nemesisnet:dev
      - docker push nemesisguy/nemesisnet:$${CI_COMMIT_SHA}
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      event: [push, tag, manual]
      branch: dev

  deploy:
    image: curlimages/curl
    commands:
      - |
        curl -s -w "%{http_code}" \
          -X PUT "https://portainer.nemesisnet.co.za/api/stacks/82?endpointId=3" \
          -H "X-API-Key: $${PORTAINER_API_KEY}" \
          -H "Content-Type: application/json" \
          -d '{"prune":true,"pullImage":true,"forceRecreate":true,"stackFileContent":"version: \"3.9\"\nservices:\n  nemesisnet-dev:\n    image: nemesisguy/nemesisnet:dev\n    container_name: nemesisnet-dev\n    restart: unless-stopped\n    ports:\n      - \"9114:3000\""}'
    environment:
      PORTAINER_API_KEY:
        from_secret: portainer_api_key
    when:
      event: [push, tag, manual]
      branch: dev

  lighthouse:
    image: node:22
    commands:
      - apt-get update && apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2
      - npm ci
      - node lighthouse-audit.js
    when:
      event: [push, tag, manual]
      branch: dev

  cleanup:
    image: docker:27
    commands:
      - docker images nemesisguy/nemesisnet --format "{{.Tag}}" | grep -v dev | grep -v "<none>" | sort -r | tail -n +3 | xargs -I {} docker rmi nemesisguy/nemesisnet:{} || true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      event: [push, tag, manual]
      branch: dev