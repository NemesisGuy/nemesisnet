steps:
  build-and-push:
    image: docker:27
    pull: true
    commands:
      - echo "Installing Node.js..."
      - apk add --no-cache nodejs npm
      - echo "Building Nuxt app..."
      - npm ci
      - npm run lint
      - npm run build
      - echo "Building Docker image..."
      - echo $${DOCKER_PASSWORD} | docker login -u $${DOCKER_USERNAME} --password-stdin
      - docker build --no-cache -t nemesisguy/nemesisnet:dev .
      - docker push nemesisguy/nemesisnet:dev
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
      NUXT_PUBLIC_NO_INDEX: "true"
      PUPPETEER_SKIP_DOWNLOAD: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      event: [push, tag, manual]
      branch: dev

  build-and-push-prod:
    image: docker:27
    pull: true
    commands:
      - echo "Installing Node.js..."
      - apk add --no-cache nodejs npm
      - echo "Building Nuxt app..."
      - npm ci
      - npm run lint
      - npm run build
      - echo "Building and pushing prod Docker image..."
      - echo $${DOCKER_PASSWORD} | docker login -u $${DOCKER_USERNAME} --password-stdin
      - docker build --no-cache -t nemesisguy/nemesisnet:latest .
      - docker push nemesisguy/nemesisnet:latest
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
      PUPPETEER_SKIP_DOWNLOAD: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      event: [push, tag, manual]
      branch: master

  deploy:
    image: alpine
    commands:
      - apk add --no-cache curl jq
      - |
        cat > /tmp/compose.yml << 'EOF'
        version: "3.9"
        services:
          nemesisnet-dev:
            image: nemesisguy/nemesisnet:dev
            container_name: nemesisnet-dev
            restart: unless-stopped
            ports:
              - "9114:3000"
            environment:
              - RESEND_API_KEY=$${RESEND_API_KEY}
              - TURNSTILE_SITE_KEY=$${TURNSTILE_SITE_KEY}
              - TURNSTILE_SECRET_KEY=$${TURNSTILE_SECRET_KEY}
              - NUXT_PUBLIC_NO_INDEX=true
        EOF
      - |
        PAYLOAD=$(jq -n \
          --rawfile sf /tmp/compose.yml \
          --arg resend "$RESEND_API_KEY" \
          --arg ts_site "$TURNSTILE_SITE_KEY" \
          --arg ts_secret "$TURNSTILE_SECRET_KEY" \
          '{
            "prune": true,
            "pullImage": true,
            "stackFileContent": $sf,
            "env": [
              {"name": "RESEND_API_KEY", "value": $resend},
              {"name": "TURNSTILE_SITE_KEY", "value": $ts_site},
              {"name": "TURNSTILE_SECRET_KEY", "value": $ts_secret},
              {"name": "NUXT_PUBLIC_NO_INDEX", "value": "true"}
            ]
          }')
        curl -s -w "%{http_code}" \
          -X PUT "https://portainer.nemesisnet.co.za/api/stacks/82?endpointId=3" \
          -H "X-API-Key: $${PORTAINER_API_KEY}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"
    environment:
      PORTAINER_API_KEY:
        from_secret: portainer_api_key
      RESEND_API_KEY:
        from_secret: RESEND_API_KEY
      TURNSTILE_SITE_KEY:
        from_secret: TURNSTILE_SITE_KEY
      TURNSTILE_SECRET_KEY:
        from_secret: TURNSTILE_SECRET_KEY
    when:
      event: [push, tag, manual]
      branch: dev

  deploy-prod:
    image: alpine
    commands:
      - apk add --no-cache curl jq
      - |
        cat > /tmp/compose.yml << 'EOF'
        version: "3.9"
        services:
          nemesisnet:
            image: nemesisguy/nemesisnet:latest
            container_name: nemesisnet
            restart: unless-stopped
            ports:
              - "9111:3000"
            environment:
              - RESEND_API_KEY=$${RESEND_API_KEY}
              - TURNSTILE_SITE_KEY=$${TURNSTILE_SITE_KEY}
              - TURNSTILE_SECRET_KEY=$${TURNSTILE_SECRET_KEY}
        EOF
      - |
        PAYLOAD=$(jq -n \
          --rawfile sf /tmp/compose.yml \
          --arg resend "$RESEND_API_KEY" \
          --arg ts_site "$TURNSTILE_SITE_KEY" \
          --arg ts_secret "$TURNSTILE_SECRET_KEY" \
          '{
            "prune": true,
            "pullImage": true,
            "stackFileContent": $sf,
            "env": [
              {"name": "RESEND_API_KEY", "value": $resend},
              {"name": "TURNSTILE_SITE_KEY", "value": $ts_site},
              {"name": "TURNSTILE_SECRET_KEY", "value": $ts_secret}
            ]
          }')
        curl -s -w "%{http_code}" \
          -X PUT "https://portainer.nemesisnet.co.za/api/stacks/32?endpointId=3" \
          -H "X-API-Key: $${PORTAINER_API_KEY}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"
    environment:
      PORTAINER_API_KEY:
        from_secret: portainer_api_key
      RESEND_API_KEY:
        from_secret: RESEND_API_KEY
      TURNSTILE_SITE_KEY:
        from_secret: TURNSTILE_SITE_KEY
      TURNSTILE_SECRET_KEY:
        from_secret: TURNSTILE_SECRET_KEY
    when:
      event: [push, tag, manual]
      branch: master

  lighthouse:
    image: node:22
    commands:
      - apt-get update && apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2
      - npm ci
      - node lighthouse-audit.js
    when:
      event: [push, tag, manual]
      branch: master


