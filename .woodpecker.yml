steps:
  build:
    image: node:22
    commands:
      - npm ci
      - npm run build
    when:
      event: [push, tag, manual]

  lighthouse:
    image: node:22
    commands:
      - apt-get update && apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2
      - npm ci
      - node lighthouse-audit.js
    when:
      event: [push, tag, manual]

  docker-build:
    image: docker:27
    pull: true
    commands:
      - docker login -u $${DOCKER_USERNAME} -p $${DOCKER_PASSWORD}
      - docker build --no-cache -t nemesisguy/nemesisnet:dev .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    secrets: [DOCKER_USERNAME, DOCKER_PASSWORD]
    when:
      event: [push, tag, manual]

  docker-push:
    image: docker:27
    pull: true
    commands:
      - docker push nemesisguy/nemesisnet:dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    secrets: [DOCKER_USERNAME, DOCKER_PASSWORD]
    when:
      event: [push, tag, manual]
      branch: dev